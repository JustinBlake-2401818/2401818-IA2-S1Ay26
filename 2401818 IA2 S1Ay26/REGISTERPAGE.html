<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="StyleSheet1.css">
    <title>Sir Greg's Register</title>
</head>
<body class="auth-page">

    <header>
        <nav class="main-nav">
            <div class="nav-top">
                <div class="nav-brand">
                    <img src="Assets/SG's LOGO.png" alt="Sir Greg Logo" class="nav-logo">
                    <span>Sir Greg's Motorcycle Parts</span>
                </div>

            <div class="nav-icons">
                <a href="HOMEPAGE.html">Home</a>
                <a href="ABOUTUSPAGE.html">About Us</a>
                <a href="REGISTERPAGE.html">Register</a>
                <a href="LOGINPAGE.html">Login</a>
                <a href="CARTPAGE.html" class="nav-link">Cart</a>
                
            </div>
        </nav>
    </header>

    <main class="auth-main">
        <section class="auth-box">
            <h2>Create Account</h2>

            <form action="#" method="post">
                
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm password" required>
                </div>

                <button type="submit" class="auth-btn">Register</button>
            </form>
        </section>
    </main>

    <footer>
        &copy; 2026 Sir Greg's
    </footer>

</body>
</html>
