<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="StyleSheet1.css">
    <title>Sir Greg's Login</title>
</head>
<body class="auth-page">

    <header>
        <nav class="main-nav">
            <div class="nav-top">
                <div class="nav-brand">
                    <img src="Assets/SG's LOGO.png" alt="Sir Greg Logo" class="nav-logo">
                    <span>Sir Greg's Motorcycle Parts</span>
                </div>

            <div class="nav-icons">
                <a href="HOMEPAGE.html">Home</a>
                <a href="ABOUTUSPAGE.html">About Us</a>
                <a href="REGISTERPAGE.html">Register</a>
                <a href="LOGINPAGE.html">Login</a>
                <a href="CARTPAGE.html" class="nav-link">Cart</a>
                
            </div>
        </nav>
    </header>

    <main class="auth-main">
        <section class="auth-box">
            <h2>Login</h2>

            <form>
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" name="login-username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="login-password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="auth-btn">Login</button>
            </form>

            <p class="auth-link">
                Don't have an account?
                <a href="REGISTERPAGE.html">Register here</a>
            </p>
        </section>
    </main>

    <footer>
        &copy; 2026 Sir Greg's
    </footer>

</body>
</html>
