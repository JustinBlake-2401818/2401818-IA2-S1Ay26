<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="StyleSheet1.css">
    <title>Sir Greg's Checkout</title>
</head>
<body>

    <header>
        <nav class="main-nav">
            <div class="nav-top">
                <div class="nav-brand">
                    <img src="Assets/SG's LOGO.png" alt="Sir Greg Logo" class="nav-logo">
                    <span>Sir Greg's Motorcycle Parts</span>
                </div>

            <div class="nav-icons">
                <a href="HOMEPAGE.html">Home</a>
                <a href="ABOUTUSPAGE.html">About Us</a>
                <a href="REGISTERPAGE.html">Register</a>
                <a href="LOGINPAGE.html">Login</a>
                <a href="CARTPAGE.html" class="nav-link">Cart</a>
                
            </div>
        </nav>
    </header>

    <main class="checkout-page">
        <section class="checkout-section">
            <h2>Checkout</h2>

            <div class="checkout-container">

                <div class="checkout-form-box">
                    <h3>Shipping Details</h3>

                    <form>
                        <div class="form-group">
                            <label for="customer-name">Full Name</label>
                            <input type="text" id="customer-name" name="customer-name" placeholder="Enter your full name" required>
                        </div>

                        <div class="form-group">
                            <label for="customer-address">Address</label>
                            <input type="text" id="customer-address" name="customer-address" placeholder="Enter your address" required>
                        </div>

                        <div class="form-group">
                            <label for="customer-parish">Parish</label>
                            <input type="text" id="customer-parish" name="customer-parish" placeholder="Enter your parish" required>
                        </div>

                        <div class="form-group">
                            <label for="customer-phone">Phone Number</label>
                            <input type="tel" id="customer-phone" name="customer-phone" placeholder="Enter your phone number" required>
                        </div>

                        <div class="form-group">
                            <label for="amount-paid">Amount Being Paid</label>
                            <input type="number" id="amount-paid" name="amount-paid" placeholder="Enter amount" required>
                        </div>
                    </form>
                </div>
                
                <!--Sample Info-->
                <aside class="checkout-summary">
                    <h3>Order Summary</h3>
                    <p>Items Total: $25,000.00</p>
                    <p>Discount: $0.00</p>
                    <p>Tax: $3,750.00</p>
                    <p><strong>Grand Total: $28,750.00</strong></p>

                    <div class="checkout-buttons">
                    <!--<button class="btn">Confirm Order</button>
                        <button class="btn">Cancel</button>
                        <button class="btn">Close</button>-->
                        <!--Remove when using javascript----------------------------->
                        <a href="INVOICEPAGE.html" class="btn">Confirm Order</a>
                        <a href="CARTPAGE.html" class="btn">Cancel</a>
                        <a href="HOMEPAGE.html" class="btn">Close</a>
                        <!----------------------------------------------------------->
                    </div>
                </aside>

            </div>
        </section>
    </main>

    <footer>
        &copy; 2026 Sir Greg's
    </footer>

</body>
</html>
